<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexChat | Modern Portfolio API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none !important; }
        #chat-box { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="auth-view" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <h1 id="auth-title" class="text-3xl font-bold text-slate-800">Welcome Back</h1>
                <p id="auth-subtitle" class="text-slate-500 mt-2 text-sm">チャットへようこそ</p>
            </div>
            <div id="auth-error" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-xs font-semibold mb-6"></div>
            
            <div class="space-y-4">
                <div id="name-field" class="hidden">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="reg-name" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" placeholder="ユーザーネーム">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" placeholder="email@example.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:outline-none transition" placeholder="••••••••">
                </div>
                <button id="auth-button" onclick="login()" class="flex items-center justify-center w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
                    <span id="auth-button-text">ログイン</span>
                </button>
                <p class="text-center text-sm text-slate-500 mt-4">
                    <span id="toggle-text">アカウントをお持ちでないですか？</span>
                    <a href="javascript:void(0)" onclick="toggleAuthMode()" id="toggle-link" class="text-blue-600 font-bold hover:underline ml-1">新規登録</a>
                </p>
            </div>
        </div>
    </div>

    <div id="friend-list-view" class="hidden flex-grow flex flex-col max-w-md mx-auto w-full bg-white shadow-xl border-x border-slate-200">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 class="font-bold text-slate-800 text-lg">友達一覧</h2>
                <span id="my-id-badge" class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full text-xs font-bold mt-1 inline-block"></span>
            </div>
            <button onclick="logout()" class="text-xs font-semibold text-slate-400 hover:text-red-500 transition">ログアウト</button>
        </div>

        <div class="p-4 border-b border-slate-100 flex gap-2 bg-white">
            <input type="number" id="new-friend-id" class="flex-grow px-4 py-2 bg-slate-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="追加したい相手のID" min="1">
            <button onclick="addFriend()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition active:scale-95 shadow-sm">
                追加
            </button>
        </div>

        <div id="friend-list-container" class="flex-grow overflow-y-auto p-2"></div>
    </div>

    <div id="chat-view" class="hidden flex-grow flex flex-col max-w-md mx-auto w-full bg-slate-50 shadow-xl border-x border-slate-200 h-screen max-h-[100dvh]">
        <div class="px-4 py-3 border-b border-slate-200 bg-white flex items-center gap-3 shadow-sm z-10">
            <button onclick="backToFriendList()" class="text-slate-400 hover:text-blue-600 transition p-2 -ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-slate-200 rounded-full flex items-center justify-center text-slate-600 font-bold text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div>
                    <h2 id="chat-friend-name" class="font-bold text-slate-800 text-sm">相手の名前</h2>
                </div>
            </div>
        </div>

        <div id="chat-box" class="flex-grow overflow-y-auto p-4 space-y-4"></div>

        <div class="p-3 border-t border-slate-200 bg-white">
            <div class="flex gap-2">
                <input type="text" id="messageInput" onkeypress="if(event.key==='Enter') sendMessage()" class="flex-grow px-4 py-2.5 bg-slate-100 rounded-full border-none focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="メッセージを入力...">
                <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-full shadow-md transition active:scale-95 flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://chat-api-9vbf.onrender.com';
        let socket;
        let accessToken = '';
        let myUserId = null;
        let isLoginMode = true;
        let currentChatFriendId = null;
        let friends = [];

        function parseJwtPayload(token) {
            try { return JSON.parse(decodeURIComponent(atob(token.split('.')[1]).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''))); } 
            catch (e) { return null; }
        }

        function showError(message) {
            const errorEl = document.getElementById('auth-error');
            errorEl.innerText = message;
            errorEl.classList.remove('hidden');
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('auth-title').innerText = isLoginMode ? 'Welcome Back' : 'Create Account';
            document.getElementById('auth-subtitle').innerText = isLoginMode ? 'チャットへようこそ' : '新しくアカウントを作成します';
            document.getElementById('name-field').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-button-text').innerText = isLoginMode ? 'ログイン' : 'アカウント作成';
            document.getElementById('auth-button').onclick = isLoginMode ? login : register;
            document.getElementById('toggle-text').innerText = isLoginMode ? 'アカウントをお持ちでないですか？' : '既にアカウントをお持ちですか？';
            document.getElementById('toggle-link').innerText = isLoginMode ? '新規登録' : 'ログイン';
        }

        async function register() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!name || !email || !password) return showError('すべての項目を入力してください');
            
            try {
                const res = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                if (res.ok) {
                    alert('アカウントを作成しました！ログインしてください。');
                    toggleAuthMode();
                } else {
                    const data = await res.json();
                    showError(data.message || '登録に失敗しました');
                }
            } catch (e) { showError('サーバーに接続できません'); }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return showError('メールアドレスとパスワードを入力してください');
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok && data.access_token) {
                    accessToken = data.access_token;
                    myUserId = parseJwtPayload(accessToken)?.sub ?? null;
                    if (!myUserId) return showError('ログイン情報の解析に失敗しました');
                    
                    document.getElementById('my-id-badge').innerText = `あなたのID: ${myUserId}`;
                    loadFriendsFromStorage();
                    initSocket();
                    showView('friend-list-view');
                } else {
                    showError(data.message || 'ログインに失敗しました');
                }
            } catch (e) { showError('サーバーに接続できません'); }
        }

        function logout() { location.reload(); }

        function showView(viewId) {
            ['auth-view', 'friend-list-view', 'chat-view'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }

        function loadFriendsFromStorage() {
            const stored = localStorage.getItem(`friends_${myUserId}`);
            if (stored) friends = JSON.parse(stored);
            renderFriendList();
        }

        function saveFriendsToStorage() {
            localStorage.setItem(`friends_${myUserId}`, JSON.stringify(friends));
        }

        async function addFriend() {
            const friendId = parseInt(document.getElementById('new-friend-id').value);
            if (!friendId || isNaN(friendId)) return alert('正しいIDを入力してください');
            if (friendId === myUserId) return alert('自分自身は追加できません');
            if (friends.some(f => f.id === friendId)) return alert('既にリストに存在します');

            try {
                const res = await fetch(`${API_URL}/users/${friendId}`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (res.ok) {
                    const userData = await res.json();
                    if (userData && userData.name) {
                        friends.push({ id: friendId, name: userData.name });
                        saveFriendsToStorage();
                        document.getElementById('new-friend-id').value = '';
                        renderFriendList();
                    } else {
                        alert('入力されたIDのユーザーは見つかりませんでした');
                    }
                } else {
                    alert('ユーザーが見つからないか、IDが間違っています');
                }
            } catch (e) {
                alert('サーバーとの通信に失敗しました');
            }
        }

        function renderFriendList() {
            const container = document.getElementById('friend-list-container');
            container.innerHTML = '';

            if (friends.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 text-sm mt-10">友達がまだいません。<br>上の入力欄からIDで追加してください。</p>`;
                return;
            }

            friends.forEach(friend => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 p-3 hover:bg-slate-50 cursor-pointer rounded-xl transition border-b border-slate-100 last:border-0";
                div.onclick = () => openChatRoom(friend.id, friend.name);
                div.innerHTML = `
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold flex-shrink-0 uppercase">
                        ${friend.name.charAt(0)}
                    </div>
                    <div class="flex-grow">
                        <h3 class="font-bold text-slate-800">${friend.name}</h3>
                        <p class="text-xs text-slate-400">ID: ${friend.id}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openChatRoom(friendId, friendName) {
            currentChatFriendId = friendId;
            document.getElementById('chat-friend-name').innerText = friendName;
            document.getElementById('chat-box').innerHTML = ''; 
            showView('chat-view');
            socket.emit('getHistory', { token: accessToken, targetId: friendId });
        }

        function backToFriendList() {
            currentChatFriendId = null;
            showView('friend-list-view');
        }

        function initSocket() {
            if (socket) return;
            socket = io(API_URL);
            socket.emit('join', { userId: myUserId });

            socket.on('loadHistory', (messages) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                messages.forEach(addMessageToBox);
            });

            socket.on('receiveMessage', (msg) => {
                const senderId = msg.senderId ?? msg.userId;
                const recipientId = msg.recipientId;
                
                if (
                    (senderId === currentChatFriendId && recipientId === myUserId) || 
                    (senderId === myUserId && recipientId === currentChatFriendId)
                ) {
                    addMessageToBox(msg);
                }
            });

            socket.on('error', (msg) => alert(msg));
        }

        function addMessageToBox(msg) {
            const box = document.getElementById('chat-box');
            const wrapper = document.createElement('div');
            const senderId = msg.senderId ?? msg.userId;
            const isMine = myUserId != null && senderId === myUserId;
            
            wrapper.className = "flex flex-col mb-4 " + (isMine ? "items-end" : "items-start");
            
            const div = document.createElement('div');
            div.className = "max-w-[80%] p-3 text-sm shadow-sm " + 
                (isMine ? "bg-blue-600 text-white rounded-2xl rounded-tr-sm" : "bg-white text-slate-700 rounded-2xl rounded-tl-sm border border-slate-200");
            
            if (!isMine) {
                const nameLabel = document.createElement('span');
                nameLabel.className = "text-[10px] font-bold mb-1 block text-slate-400";
                nameLabel.textContent = msg.sender?.name || 'Unknown';
                div.prepend(nameLabel);
            }

            div.insertAdjacentHTML('beforeend', `<p class="leading-relaxed break-words">${msg.content}</p>`);
            wrapper.appendChild(div);
            box.appendChild(wrapper);
            box.scrollTop = box.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            if (!input.value.trim() || !accessToken || !currentChatFriendId) return;

            socket.emit('sendMessage', {
                token: accessToken,
                content: input.value,
                recipientId: currentChatFriendId
            });
            input.value = '';
        }
    </script>
</body>
</html>
